<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>

    <script src="04_PasswordChecker.js"></script>

    <script>
        let checkerObj = null;
        let exports = {};

        function startPage() {
            checkerObj = new PasswordChecker();
        }

        function checkPassword() {
            let password = document.getElementById("passwordInput").value;
            let result = checkerObj.check(password);
            document.getElementById("result").innerText = result;
        }

        window.startPage = startPage;
        window.checkPassword = checkPassword;
    </script>

    <style>
        input[type=password] {
            width: 200px;
        }
        #result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body onload="startPage()">
    <h2>Password Checker</h2>

    <input type="password" id="passwordInput">
    <input type="button" value="Check" onclick="checkPassword()">

    <div id="result"></div>
</body>
</html>
