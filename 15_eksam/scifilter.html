<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SciFilter Access System</title>

    <style>
        body {
            margin: 0;
            padding: 30px;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 5px;
        }

        .subtitle {
            margin-top: 0;
            color: #5d6772;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border: 1px solid #d9dee3;
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        select,
        input {
            box-sizing: border-box;
            width: 100%;
            max-width: 500px;
            padding: 9px;
            border: 1px solid #b8c0c8;
            border-radius: 5px;
        }

        button {
            margin-top: 12px;
            margin-right: 8px;
            padding: 9px 14px;
            border: none;
            border-radius: 5px;
            background-color: #355f8a;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #274b6f;
        }

        .logout-button {
            background-color: #9b3d3d;
        }

        .logout-button:hover {
            background-color: #7d2f2f;
        }

        .action-block {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #e1e5e9;
        }

        #output {
            min-height: 130px;
            margin-top: 10px;
            padding: 14px;
            background-color: #f7f9fb;
            border: 1px solid #d9dee3;
            border-radius: 6px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SciFilter</h1>
        <p class="subtitle">Role-based access system demonstration</p>

        <!-- Login form -->
        <section id="login-section" class="card">
            <h2>Log in</h2>

            <label for="user-select">Choose a user</label>
            <select id="user-select">
                <option value="">Select a user</option>
            </select>

            <br>

            <button type="button" onclick="loginSelectedUser()">
                Log in
            </button>
        </section>

        <!-- Dashboard shown after login -->
        <section id="dashboard-section" class="card hidden">
            <h2>Dashboard</h2>

            <p id="user-info"></p>

            <h3>Your permissions</h3>
            <ul id="permissions-list"></ul>

            <div id="actions-container"></div>

            <button
                type="button"
                class="logout-button"
                onclick="logoutCurrentUser()"
            >
                Log out
            </button>
        </section>

        <!-- Shared area where results appear -->
        <section class="card">
            <h2>Output</h2>
            <div id="output">Choose a user and log in.</div>
        </section>
    </div>

    <!-- The compiled TypeScript file must be loaded first -->
    <script src="scifilter.js"></script>

    <script>
        // Adds available users to the login dropdown
        function startPage() {
            const select = document.getElementById("user-select");

            users.forEach(user => {
                const option = document.createElement("option");

                option.value = user.getUserId().toString();

                option.textContent =
                    user.getName() + " | " + user.getRole();

                select.appendChild(option);
            });
        }


        // Logs in as the user selected in the dropdown
        function loginSelectedUser() {
            const select =
                document.getElementById("user-select");

            const selectedId = Number(select.value);

            if (!selectedId) {
                showMessage("Please choose a user before logging in.");
                return;
            }

            const selectedUser =
                users.find(user =>
                    user.getUserId() === selectedId
                );

            if (!selectedUser) {
                showMessage("User was not found.");
                return;
            }

            currentUser = selectedUser;

            showMessage(currentUser.login());

            renderDashboard();
        }


        // Logs out the current user
        function logoutCurrentUser() {
            if (currentUser === null) {
                return;
            }

            showMessage(currentUser.logout());

            currentUser = null;

            document
                .getElementById("dashboard-section")
                .classList.add("hidden");

            document
                .getElementById("login-section")
                .classList.remove("hidden");

            document.getElementById("user-select").value = "";
        }


        // Displays information and actions for the current role
        function renderDashboard() {
            if (currentUser === null) {
                return;
            }

            document
                .getElementById("login-section")
                .classList.add("hidden");

            document
                .getElementById("dashboard-section")
                .classList.remove("hidden");

            document.getElementById("user-info").textContent =
                "Name: " + currentUser.getName() +
                " | Email: " + currentUser.getEmail() +
                " | Role: " + currentUser.getRole();

            const permissionsList =
                document.getElementById("permissions-list");

            permissionsList.innerHTML = "";

            currentUser.getPermissions().forEach(permission => {
                const item = document.createElement("li");

                item.textContent = permission;

                permissionsList.appendChild(item);
            });

            renderRoleActions();
        }


        // Creates different buttons depending on the user role
        function renderRoleActions() {
            const container =
                document.getElementById("actions-container");

            if (currentUser instanceof Viewer) {
                container.innerHTML = getViewerActions();
                return;
            }

            if (currentUser instanceof Researcher) {
                container.innerHTML = getResearcherActions();
                return;
            }

            if (currentUser instanceof Admin) {
                container.innerHTML = getAdminActions();
                return;
            }

            container.innerHTML = "";
        }


        // HTML controls shown only to Viewer
        function getViewerActions() {
            return `
                <div class="action-block">
                    <h3>Viewer actions</h3>

                    <button
                        type="button"
                        onclick="viewerBrowsePublications()"
                    >
                        View all publications
                    </button>

                    <label for="viewer-publication">
                        Choose a publication
                    </label>

                    <select id="viewer-publication">
                        ${getPublicationOptions()}
                    </select>

                    <br>

                    <button
                        type="button"
                        onclick="viewerViewDetails()"
                    >
                        View publication details
                    </button>
                </div>
            `;
        }


        // HTML controls shown only to Researcher
        function getResearcherActions() {
            return `
                <div class="action-block">
                    <h3>Researcher actions</h3>

                    <button
                        type="button"
                        onclick="researcherBrowsePublications()"
                    >
                        View all publications
                    </button>

                    <label for="search-query">
                        Search by title or author
                    </label>

                    <input
                        id="search-query"
                        type="text"
                        placeholder="For example: Anna or AI"
                    >

                    <br>

                    <button
                        type="button"
                        onclick="researcherSearchPublications()"
                    >
                        Search publications
                    </button>

                    <label for="minimum-score">
                        Minimum quality score
                    </label>

                    <input
                        id="minimum-score"
                        type="number"
                        min="0"
                        max="10"
                        placeholder="For example: 8"
                    >

                    <br>

                    <button
                        type="button"
                        onclick="researcherFilterByScore()"
                    >
                        Filter publications
                    </button>

                    <label for="researcher-publication">
                        Choose a publication to save
                    </label>

                    <select id="researcher-publication">
                        ${getPublicationOptions()}
                    </select>

                    <br>

                    <button
                        type="button"
                        onclick="researcherSavePublication()"
                    >
                        Save publication
                    </button>

                    <button
                        type="button"
                        onclick="researcherViewSavedPublications()"
                    >
                        View saved publications
                    </button>
                </div>
            `;
        }


        // HTML controls shown only to Admin
        function getAdminActions() {
            return `
                <div class="action-block">
                    <h3>Admin actions</h3>

                    <button
                        type="button"
                        onclick="adminViewUsers()"
                    >
                        View users
                    </button>

                    <button
                        type="button"
                        onclick="adminViewLogs()"
                    >
                        View access logs
                    </button>
                </div>
            `;
        }


        // Creates a dropdown list containing all publications
        function getPublicationOptions() {
            return publications
                .map((publication, index) =>
                    `<option value="${index}">
                        ${publication.getTitle()}
                    </option>`
                )
                .join("");
        }


        // Viewer functions
        function viewerBrowsePublications() {
            if (!(currentUser instanceof Viewer)) {
                return;
            }

            showMessage(
                currentUser.browsePublications(publications)
            );
        }


        function viewerViewDetails() {
            if (!(currentUser instanceof Viewer)) {
                return;
            }

            const select =
                document.getElementById("viewer-publication");

            const selectedIndex = Number(select.value);

            showMessage(
                currentUser.viewPublicationDetails(
                    publications[selectedIndex]
                )
            );
        }


        // Researcher functions
        function researcherBrowsePublications() {
            if (!(currentUser instanceof Researcher)) {
                return;
            }

            showMessage(
                currentUser.browsePublications(publications)
            );
        }


        function researcherSearchPublications() {
            if (!(currentUser instanceof Researcher)) {
                return;
            }

            const query =
                document
                    .getElementById("search-query")
                    .value
                    .trim();

            if (query === "") {
                showMessage("Please enter a search query.");
                return;
            }

            const results =
                currentUser.searchPublications(
                    publications,
                    query
                );

            showMessage(formatPublicationList(results));
        }


        function researcherFilterByScore() {
            if (!(currentUser instanceof Researcher)) {
                return;
            }

            const minimumScore =
                Number(
                    document
                        .getElementById("minimum-score")
                        .value
                );

            if (Number.isNaN(minimumScore)) {
                showMessage("Please enter a valid minimum score.");
                return;
            }

            const results =
                currentUser.filterByScore(
                    publications,
                    minimumScore
                );

            showMessage(formatPublicationList(results));
        }


        function researcherSavePublication() {
            if (!(currentUser instanceof Researcher)) {
                return;
            }

            const select =
                document.getElementById("researcher-publication");

            const selectedIndex = Number(select.value);

            showMessage(
                currentUser.savePublication(
                    publications[selectedIndex]
                )
            );
        }


        function researcherViewSavedPublications() {
            if (!(currentUser instanceof Researcher)) {
                return;
            }

            showMessage(
                currentUser.viewSavedPublications()
            );
        }


        // Admin functions
        function adminViewUsers() {
            if (!(currentUser instanceof Admin)) {
                return;
            }

            showMessage(
                currentUser.viewUsers(users)
            );
        }


        function adminViewLogs() {
            if (!(currentUser instanceof Admin)) {
                return;
            }

            showMessage(
                currentUser.viewAllLogs()
            );
        }


        // Displays text in the Output section
        function showMessage(message) {
            document.getElementById("output").textContent =
                message;
        }


        startPage();
    </script>
</body>
</html>
